name: Kiem thu ung dung

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai dat Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cai dat thu vien
        run: npm install

      - name: Kiem tra cu phap JavaScript
        run: npm run check

      - name: Chay kiem thu
        run: npm test
